version: "3.8"

services:
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-agent
    ports:
      - "8080:8080" # HTTP server for web UI
      - "3000:3000" # WebSocket server
    environment:
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Azure OpenAI Configuration
      - USE_AZURE=${USE_AZURE:-false}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_API_VERSION=${AZURE_API_VERSION:-2025-01-01-preview}

      # Deepgram Configuration
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}

      # Azure Speech Services Configuration
      - USE_AZURE_SPEECH=${USE_AZURE_SPEECH:-false}
      - AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY}
      - AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION}
      - AZURE_SPEECH_ENDPOINT=${AZURE_SPEECH_ENDPOINT}
      - AZURE_SPEECH_LANGUAGE=${AZURE_SPEECH_LANGUAGE:-en-US}
      - AZURE_SPEECH_VOICE=${AZURE_SPEECH_VOICE:-en-US-JennyNeural}

      # STT/TTS Provider Selection
      - STT_PROVIDER=${STT_PROVIDER:-deepgram}
      - TTS_PROVIDER=${TTS_PROVIDER:-deepgram}

      # OpenAI Model Settings
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}

      # Recording Settings
      - ENABLE_RECORDINGS=${ENABLE_RECORDINGS:-false}

      # Debug Settings
      - DEBUG=${DEBUG:-true}
      - VERBOSE=${VERBOSE:-false}
    volumes:
      # Persist recordings outside container
      - ./recordings:/app/recordings
    restart: unless-stopped
    networks:
      - voice-agent-network

networks:
  voice-agent-network:
    driver: bridge
